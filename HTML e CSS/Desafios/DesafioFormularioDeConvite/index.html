<!doctype html>
<html lang="pt-BR">
  <head>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Festivite</title>
    <link rel="stylesheet" href="/styles/index.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400..800&family=Leckerli+One&family=Open+Sans:ital,wght@0,300..800;1,300..800&display=swap"
      rel="stylesheet"
    />
    <script src="validarInput.js" defer></script>
  </head>
  <body>
    <aside>
      <div class="title">
        <img src="assets/Logo.svg" alt="Logo Festivite" />
        <div class="title-text">
          <h1>Festivite</h1>
          <p>Crie um convite digital para seu evento</p>
        </div>
      </div>
    </aside>
    <main>
      <form action="">
        <h2>Crie seu convite</h2>
        <fieldset id="about">
          <div class="input-title">
            <img src="assets/icons/calendar.svg" alt="Ícone de calendário" />
            <legend>Sobre o evento</legend>
          </div>
          <div class="input-wrapper">
            <label for="">Título</label>
            <input type="text" placeholder="Nome do evento" required />
          </div>
          <div class="input-group">
            <div class="input-wrapper">
              <label for="">Início</label>
              <input
                type="datetime-local"
                placeholder="DD/MM/AAAA, --:--"
                required
              />
            </div>
            <div class="input-wrapper">
              <label for="">Fim</label>
              <input
                type="datetime-local"
                placeholder="DD/MM/AAAA, --:--"
                required
              />
            </div>
          </div>
          <div class="input-group">
            <div class="input-wrapper">
              <label for="">Tipo</label>
              <div class="toggle-switch-wrapper">
                <input
                  type="radio"
                  name="switch"
                  id="switch"
                  required
                  class="type1"
                  checked
                />
                <input
                  type="radio"
                  name="switch"
                  id="switch"
                  required
                  class="type2"
                />
              </div>
            </div>
            <div class="input-wrapper">
              <label for="">Local</label>
              <input type="text" placeholder="Link ou endereço" required />
            </div>
          </div>
          <div class="textarea-wrapper">
            <label for="">Descrição</label>
            <textarea
              name="description"
              id="description"
              placeholder="Escreva sobre os detalhes do evento"
            ></textarea>
          </div>
        </fieldset>
        <fieldset id="personalize">
          <div class="input-title">
            <img
              src="assets/icons/paintbrush-vertical.svg"
              alt="Ícone de calendário"
            />
            <legend>Personalização</legend>
          </div>
          <div class="principal-color">
            <label for="">Cor principal</label>
            <div class="radio-color-wrapper">
              <label class="input-border">
                <input
                  type="radio"
                  name="radio-color"
                  id="radio-color"
                  required
                  checked
                  class="bg-color-brand-light"
                />
              </label>
              <label class="input-border">
                <input
                  type="radio"
                  name="radio-color"
                  id="radio-color"
                  required
                  checked
                  class="bg-color-navy"
                />
              </label>
              <label class="input-border">
                <input
                  type="radio"
                  name="radio-color"
                  id="radio-color"
                  required
                  checked
                  class="bg-color-purple"
                />
              </label>
              <label class="input-border">
                <input
                  type="radio"
                  name="radio-color"
                  id="radio-color"
                  required
                  checked
                  class="bg-color-fuschia"
                />
              </label>
              <label class="input-border">
                <input
                  type="radio"
                  name="radio-color"
                  id="radio-color"
                  required
                  checked
                  class="bg-color-pink"
                />
              </label>
              <label class="input-border">
                <input
                  type="radio"
                  name="radio-color"
                  id="radio-color"
                  required
                  checked
                  class="bg-color-danger"
                />
              </label>
              <label class="input-border">
                <input
                  type="radio"
                  name="radio-color"
                  id="radio-color"
                  required
                  checked
                  class="bg-color-orange"
                />
              </label>
              <label class="input-border">
                <input
                  type="radio"
                  name="radio-color"
                  id="radio-color"
                  required
                  checked
                  class="bg-color-yellow"
                />
              </label>
              <label class="input-border">
                <input
                  type="radio"
                  name="radio-color"
                  id="radio-color"
                  required
                  checked
                  class="bg-color-lime"
                />
              </label>
              <label class="input-border">
                <input
                  type="radio"
                  name="radio-color"
                  id="radio-color"
                  required
                  checked
                  class="bg-color-green"
                />
              </label>
              <label class="input-border">
                <input
                  type="radio"
                  name="radio-color"
                  id="radio-color"
                  required
                  checked
                  class="bg-color-cyan"
                />
              </label>
            </div>
          </div>
          <div class="event-theme">
            <label for="">Tema do evento</label>
            <div class="theme-radio-wrapper">
              <input type="radio" />
            </div>
          </div>
          <div class="more-configs">
            <div class="style-config">
              <label for="">Estilo</label>
              <div class="style-config-infos">
                <input type="checkbox" />
                <p>Escuro</p>
              </div>
            </div>
            <div class="cover-photo">
              <label for="">Foto de capa</label>
              <div class="cover-photo-info">
                <input type="file" required />
              </div>
            </div>
          </div>
        </fieldset>

        <button>oi</button>
      </form>
    </main>
  </body>
</html>
